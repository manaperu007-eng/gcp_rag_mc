# ==============================================================================
# backend/pyproject.toml
# Tool configuration: ruff (linting), pytest
# ==============================================================================

[tool.ruff]
target-version = "py312"
line-length    = 100
src            = ["api", "ingestion", "notifications", "shared"]

[tool.ruff.lint]
select = [
  "E",   # pycodestyle errors
  "W",   # pycodestyle warnings
  "F",   # Pyflakes
  "I",   # isort
  "B",   # flake8-bugbear
  "C4",  # flake8-comprehensions
  "UP",  # pyupgrade
]
ignore = [
  "E501",  # line-length handled by formatter
  "B008",  # FastAPI Depends() calls in function defaults
  "B904",  # raise-without-from — some intentional bare raises
]

[tool.ruff.lint.per-file-ignores]
"**/routers/*.py"    = ["B008"]  # FastAPI dependency injection pattern
"**/dependencies.py" = ["B008"]

[tool.ruff.format]
quote-style              = "double"
indent-style             = "space"
skip-magic-trailing-comma = false

[tool.pytest.ini_options]
testpaths    = ["tests"]
asyncio_mode = "auto"
log_cli      = true
log_cli_level = "INFO"
